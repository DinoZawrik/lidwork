name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_label: macos-arm64
          - os: ubuntu-22.04
            artifact_label: linux-x86_64
          - os: windows-latest
            artifact_label: windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependencies
        run: python -m pip install -e ".[build]"

      - name: Build release artifact
        run: python packaging/build.py

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/release/*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_label }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-22.04
    needs:
      - build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts

      - name: Collect artifacts and compute checksums
        run: |
          mkdir -p dist
          find release-artifacts -type f -exec cp {} dist/ \;
          cd dist
          sha256sum * > SHA256SUMS
          echo "Published artifacts:"
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
