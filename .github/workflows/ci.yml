name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e .

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff
        run: python -m ruff check .

      - name: Import smoke test
        run: python -c "import lidwork.cli"

      - name: CLI entry-point smoke test
        run: lidwork --help
